name: CI Pipeline - BobApp
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./back
    steps:
      - name: Retrieve the code
        uses: actions/checkout@v6

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Run the tests and Jacoco
        run: mvn clean verify

      - name: Save the test report Back
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-back
          path: back/target/site/jacoco

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front
    steps:
      - name: Retrieve the code
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '16'
      - name: Install dependencies
        run: npm install
      - name: Run the tests and coverage
        run: npm test -- --watch=false --code-coverage --browsers=ChromeHeadless
      - name: Save the test report Front
        uses: actions/upload-artifact@v7
        with:
          name: coverage-front
          path: front/coverage

  sonar-analysis:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Back Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report-back
          path: back/target/site/jacoco/

      - name: Download Front Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-front
          path: front/coverage/bobapp/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@v3
